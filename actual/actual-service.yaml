apiVersion: v1
kind: Service
metadata:
  name: actual-service
  namespace: default
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.1.231"
spec:
  type: LoadBalancer
  # --- ADD THIS LINE ---
  externalTrafficPolicy: Local
  # ----------------------
  ports:
    - port: 5006
      targetPort: 5006
      protocol: TCP
      name: http
  selector:
    app: actual