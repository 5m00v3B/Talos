apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions-deployer
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: deployment-restarter
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  resourceNames: ["actual"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-restarter-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: github-actions-deployer
  namespace: default
roleRef:
  kind: Role
  name: deployment-restarter
  apiGroup: rbac.authorization.k8s.io